name: Deploy experiment-2 to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'derisking-experiments/experiment-2/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: derisking-experiments/experiment-2/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE_PATH: /flora-derisking-exp2/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: derisking-experiments/experiment-2/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
